[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.26"
optimizer = true
optimizer_runs = 200
via_ir = true
remappings = [
  "@openzeppelin/=lib/openzeppelin-contracts/",
  "forge-std/=lib/forge-std/src/",
]

# Allow Deploy.s.sol to write addresses.json one level up
fs_permissions = [
  { access = "write", path = "../addresses.json" },
  { access = "read",  path = "../addresses.json" },
]

[fmt]
line_length = 110
tab_width = 4
bracket_spacing = true

[rpc_endpoints]
"0g-galileo" = "${ZG_GALILEO_RPC}"
"0g-aristotle" = "${ZG_ARISTOTLE_RPC}"

[etherscan]
"0g-galileo" = { key = "${ZG_EXPLORER_KEY}", url = "https://chainscan-galileo.0g.ai/api" }
